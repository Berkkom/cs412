File: base.html
Author: Berk Komurcuoglu (berkkom@bu.edu), 4/10/2026
Description: Base template for mini_insta pages. Provides shared layout, navigation,
authentication links (login/logout), and loads CSS.
-->

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mini_insta</title>

  <link rel="stylesheet" href="{% static 'mini_insta_styles.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title"><a href="{% url 'show_all_profiles' %}">mini_insta</a></h1>
      <nav class="site-nav">
        <a href="{% url 'show_all_profiles' %}">All Profiles</a>
      
        {% if request.user.is_authenticated %}
           <span>Logged in as {{ request.user.username }}</span>
           <a href="{% url 'my_profile' %}">My Profile</a>
           <a href="{% url 'show_feed' %}">Feed</a>
           <a href="{% url 'search' %}">Search</a>
      
           <form method="POST" action="{% url 'logout' %}" class="inline-form">
              {% csrf_token %}
              <button type="submit">Logout</button>
            </form>
        {% else %}
           <a href="{% url 'login' %}">Login</a>
           <a href="{% url 'create_profile' %}">Create Profile</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <a href="{% url 'show_all_profiles' %}">All Profiles</a>
    </div>
  </footer>
</body>
</html>
