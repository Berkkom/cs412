<!-- File: base.html -->
<!-- Author: Berk Komurcuoglu (berkkom@bu.edu) 4/3/2026 -->
<!-- Description: Base template for the dadjokes app. Provides shared -->
<!-- layout, styling, and navigation used by all other templates. -->
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Dad Jokes{% endblock %}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #121212;
            color: #FFFFFF;
        }
        h1 { color: #1DB954; }
        h2 { color: #FFFFFF; }
        nav { margin-bottom: 30px; }
        nav a {
            display: inline-block;
            margin-right: 10px;
            text-decoration: none;
            color: #FFFFFF;
            font-weight: bold;
            background-color: #282828;
            padding: 8px 16px;
            border-radius: 20px;
            transition: background-color 0.2s;
        }
        nav a:hover {
            background-color: #1DB954;
            text-decoration: none;
        }
        .joke-card, .picture-card {
            background: #282828;
            border: none;
            border-left: 4px solid #1DB954;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .joke-text { font-size: 1.2em; font-style: italic; color: #FFFFFF; }
        .contributor { color: #B3B3B3; font-size: 0.9em; margin-top: 8px; }
        img { max-width: 100%; border-radius: 8px; }
        a { color: #1DB954; }
        a:hover { color: #1ed760; }
    </style>
</head>
<body>
    <h1>Dad Jokes</h1>
    <nav>
        <a href="{% url 'random_home' %}">Random</a>
        <a href="{% url 'all_jokes' %}">All Jokes</a>
        <a href="{% url 'all_pictures' %}">All Pictures</a>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
