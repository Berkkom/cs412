<!-- Description: Template that displays a listing of all Jokes. -->
{% extends 'dadjokes/base.html' %}
{% block title %}All Jokes{% endblock %}
{% block content %}
<h2>All Jokes</h2>
{% for joke in jokes %}
<div class="joke-card">
    <p class="joke-text">{{ joke.text }}</p>
    <p class="contributor">— contributed by {{ joke.contributor }} | <a href="{% url 'one_joke' joke.pk %}">View</a></p>
</div>
{% empty %}
<p>No jokes yet!</p>
{% endfor %}
{% endblock %}
