<!-- Description: Base template for the music rating application. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Music Rater{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
        }
        nav {
            background-color: #1a1a1a;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            border-bottom: 1px solid #2a2a2a;
        }
        nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        nav a:hover { color: #1db954; }
        nav .logo {
            font-size: 20px;
            font-weight: 700;
            color: #1db954;
            margin-right: 16px;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 16px;
        }
        h1 { font-size: 28px; margin-bottom: 24px; }
        h2 { font-size: 22px; margin-bottom: 16px; }
        h3 { font-size: 18px; margin-bottom: 12px; }
        a { color: #1db954; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .card {
            background-color: #1a1a1a;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .card:hover { background-color: #222; }
        .score {
            color: #1db954;
            font-weight: 700;
            font-size: 18px;
        }
        .meta {
            color: #888;
            font-size: 13px;
            margin-top: 4px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .tag {
            display: inline-block;
            background-color: #2a2a2a;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 6px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'project:search' %}" class="logo">Music Rater</a>
        <a href="{% url 'project:feed' %}">Feed</a>
        <a href="{% url 'project:search' %}">Discover Music</a>
        <a href="{% url 'project:profile_list' %}">Search Profiles</a>
        <div style="margin-left: auto; display: flex; align-items: center; gap: 16px;">
            {% if user.is_authenticated %}
            <a href="{% url 'project:profile_detail' user.music_profile.pk %}">@{{ user.username }}</a>
            <form method="POST" action="{% url 'project:logout' %}" style="display: inline;">
                {% csrf_token %}
                <button type="submit" style="background: none; border: none; color: #e0e0e0; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'project:login' %}">Login</a>
            <a href="{% url 'project:register' %}" style="background: #1db954; color: #000; padding: 6px 16px; border-radius: 20px; font-weight: 600;">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
